name: Daily Data Update
on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 Israel daily
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create .env with HubSpot token
        run: echo "HUBSPOT_TOKEN=${{ secrets.HUBSPOT_TOKEN }}" > .env

      - name: Pull fresh data from HubSpot
        run: python update_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard $(date -u +'%b %d, %Y %H:%M')"
          git push

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
